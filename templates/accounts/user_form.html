{% extends "base.html" %}

{% block content %}
<div class="max-w-2xl rounded-3xl bg-white p-8 shadow-sm ring-1 ring-slate-200">
    <h1 class="text-2xl font-semibold">{{ page_title|default:"Tambah Pengguna" }}</h1>
    <form method="post" class="mt-6 space-y-4">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="rounded-xl bg-slate-900 px-4 py-3 text-white">{{ submit_label|default:"Simpan" }}</button>
    </form>
</div>
{% endblock %}
