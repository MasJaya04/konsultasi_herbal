{% extends "base.html" %}

{% block title %}Masuk{% endblock %}

{% block content %}
<div class="mx-auto max-w-md rounded-3xl bg-white p-8 shadow-sm ring-1 ring-slate-200">
    <h1 class="text-2xl font-semibold">Masuk Sistem</h1>
    <p class="mt-2 text-sm text-slate-500">Masuk untuk mengakses konsultasi herbal berbasis AI.</p>
    <form method="post" class="mt-6 space-y-4">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="w-full rounded-xl bg-slate-900 px-4 py-3 text-white">Masuk</button>
    </form>
</div>
{% endblock %}
